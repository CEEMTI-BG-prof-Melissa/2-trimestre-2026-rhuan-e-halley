<!DOCTYPE HTML>
<html lang="pt-br">
 <head>
    <title>Formulário HTML</title>
    <meta charset="UTF-8">
 </head>

<body>
    <h1>Cadastro de Usuário</h1>
    <form action="cadastro.php" method="GET">
    <label for="nome">Nome: </label>
    <input type="text" Name="Nome" id="nome">
    <br>
    <label for="email">E-mail:</label>
    <input type="email" id="email" name="email">
    <br>
    <label for="senha">Senha:</label>
    <input type="password" id="Senha" name="senha">
    <br>
    <label for="idade">Idade:</label>
    <input type="number" name="idade" id="idade">
    <br>
    <label for="data">Data de nascimento:</label>
    <input type="date" name="data" id="nascimento">
    <br>
    <p>Turno:</p>
    <input type="radio" name="turno" id=" manha"> <label for="manha">Manhã</label>
    <input type="radio" name="turno" id=" tarde"> <label for="tarde">Tarde</label>
    <input type="radio" name="turno" id=" noite"> <label for="noite">Noite</label>
    <br>
    <p>Áreas de interrese:</p>
    <input type="checkbox" name="area" id="programacao"> <label for="programacao">Programação</label>
    <input type="checkbox" name="area" id="design"> <label for="design">Design</label>
    <input type="checkbox" name="area" id="redes"> <label for="redes">Redes</label>
    <br>
    <input type="submit" value="Enviar">
    <input type="reset" value="Limpar">
    </form>
</body>
</html>
